<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Beauty Studio{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

  <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">

  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">

  {% block extra_head %}{% endblock %}
</head>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('admin.panel') }}">Admin Studio</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active"
            href="{{ url_for('admin.profesionales_admin') }}">Profesionales</a></li>
        <li class="nav-item"><a class="nav-link active" href="{{ url_for('admin.servicios_admin') }}">Servicios</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.reservas_admin') }}">Reservas</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.horarios_admin') }}">Horarios</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.agenda_admin') }}">Agenda</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.galeria_admin') }}">Galería</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.clientes_admin') }}">Clientes</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.bloqueos_admin') }}">Bloqueos</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('landing.inicio') }}">Sitio</a></li>
      </ul>
      <ul class="navbar-nav ms-3">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.logout') }}">Cerrar sesión</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-3">

    {% include 'components/alertas.html' %}

</div>

<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

  <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

  <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

  <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>

  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>

  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

  <script src="{{ url_for('static', filename='js/datatable-config.js') }}"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

    let alerts = document.querySelectorAll(".alert");

    alerts.forEach(function(alert){

        setTimeout(function(){

            let bsAlert = bootstrap.Alert.getOrCreateInstance(alert);

            bsAlert.close();

        },5000);

    });

});

</script>


  {% block scripts %}{% endblock %}
</body>

</html>
